<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Pipecat Voice Agent</title>
<style>
  body { font: 14px/1.55 -apple-system,Segoe UI,Helvetica,Arial,sans-serif; max-width: 760px; margin: 24px auto; padding: 0 16px; color: #222; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .sub { color:#666; margin-bottom: 18px; }
  #models_status { display:flex; gap:14px; flex-wrap:wrap; }
  .mstat { display:inline-flex; align-items:center; gap:5px; font-size:13px; }
  .mstat .dot { width:8px; height:8px; border-radius:50%; background:#d1d5db; flex:none; }
  .mstat.ok  .dot { background:#22c55e; }
  .mstat.err .dot { background:#ef4444; }
  button { padding: 8px 14px; border: 0; border-radius: 4px; background: #2563eb; color: #fff; cursor: pointer; font-size: 14px; }
  button:hover { background: #1d4ed8; }
  button[disabled] { background:#999; cursor: not-allowed; }
  .stop  { background: #dc2626; }
  .stop:hover { background: #b91c1c; }
  .ghost { background:#e5e7eb; color:#374151; }
  .ghost:hover { background:#d1d5db; }
  .ghost.active { background:#fde68a; color:#92400e; }
  .ghost.active:hover { background:#fcd34d; }
  .row { display:flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
  .pill { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 12px; background: #f3f4f6; color:#374151; }
  .ok    { background: #dcfce7; color: #166534; }
  .warn  { background: #fef3c7; color: #92400e; }
  .err   { background: #fee2e2; color: #991b1b; }
  fieldset { border: 1px solid #e5e7eb; border-radius: 6px; padding: 12px 14px; margin-bottom: 12px; }
  legend { color:#555; font-weight: 600; font-size: 13px; padding: 0 6px; }
  label { display: block; font-size: 12px; color: #6b7280; margin: 8px 0 4px; }
  textarea { width: 100%; box-sizing: border-box; padding: 8px; border: 1px solid #d1d5db; border-radius: 4px; font: 13px/1.5 -apple-system,Segoe UI,Helvetica,Arial,sans-serif; resize: vertical; }
  pre { background:#0b1020; color:#d3deff; padding: 10px 12px; border-radius:6px; overflow:auto; max-height: 280px; font-size: 12px; }
  audio { width: 100%; margin-top: 6px; }
  .small { font-size: 12px; color:#6b7280; }
  details summary { cursor: pointer; font-weight: 600; color: #374151; padding: 4px 0; }
  .btnbar { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .btnbar button { padding: 5px 10px; font-size: 12px; }

  /* transcript */
  .transcript {
    display: flex; flex-direction: column; gap: 6px;
    max-height: 360px; overflow-y: auto; padding: 4px 2px;
  }
  .transcript .empty {
    color: #9ca3af; text-align: center; padding: 24px 0; font-size: 12px;
  }
  .bubble {
    padding: 7px 11px; border-radius: 12px; max-width: 78%;
    line-height: 1.5; word-break: break-word; white-space: pre-wrap;
    font-size: 14px;
  }
  .bubble.user {
    align-self: flex-end; background: #2563eb; color: #fff;
    border-bottom-right-radius: 3px;
  }
  .bubble.bot {
    align-self: flex-start; background: #f1f5f9; color: #111827;
    border-bottom-left-radius: 3px;
  }
  .bubble.bot.pending { color: #6b7280; font-style: italic; }
  .bubble.bot.error   { background: #fee2e2; color: #991b1b; }
  .bubble .meta {
    display: block; font-size: 10px; opacity: 0.7;
    margin-top: 3px; font-style: normal;
  }
  .bubble.user .meta { color: #dbeafe; }

  /* config grid */
  .cfg-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 8px 12px;
  }
  .cfg-grid .cfg-wide { grid-column: 1 / -1; }
  label.cfg {
    display: flex; flex-direction: column; gap: 4px;
    margin: 0;
  }
  label.cfg > span:first-child {
    font-size: 12px; color: #374151; font-weight: 600;
    display: flex; flex-direction: column; gap: 1px;
  }
  label.cfg > span:first-child .small { font-weight: normal; }
  label.cfg input {
    margin-top: auto;
    padding: 5px 7px; border: 1px solid #d1d5db; border-radius: 4px;
    font-size: 13px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  label.cfg input:focus { outline: 2px solid #2563eb; outline-offset: -1px; border-color: #2563eb; }
  #cfg_status.ok   { color: #166534; }
  #cfg_status.err  { color: #991b1b; }
  #cfg_status.warn { color: #92400e; }
</style>
</head>
<body>
<h1>Pipecat 实时语音对话</h1>
<div class="sub" id="models_status">
  <span class="mstat" data-m="funasr"><span class="dot"></span>FunASR</span>
  <span class="mstat" data-m="qwen"><span class="dot"></span>Qwen3.6-27B</span>
  <span class="mstat" data-m="cosyvoice"><span class="dot"></span>CosyVoice 3</span>
</div>

<fieldset>
  <legend>角色设定</legend>
  <label>System Prompt（角色出厂设定，整局对话都生效）</label>
  <textarea id="system_prompt" rows="6" placeholder="加载中..."></textarea>

  <label>Greeting（连接后让 AI 主动说的开场指令）</label>
  <textarea id="greeting" rows="2" placeholder="加载中..."></textarea>

  <label>音色</label>
  <select id="voice_select" style="padding:5px 8px;border:1px solid #d1d5db;border-radius:4px;font-size:13px;margin-bottom:8px"><option value="">加载中...</option></select>

  <div class="btnbar">
    <button class="ghost" data-tpl="default">默认助手</button>
    <button class="ghost" data-tpl="cafe">咖啡店店员·小晴</button>
    <button class="ghost" data-tpl="socrates">苏格拉底</button>
    <button class="ghost" data-tpl="english">英语陪练·Lily</button>
    <button class="ghost" id="btn_save_local">💾 保存到浏览器</button>
    <button class="ghost" id="btn_clear_local">清除本地保存</button>
  </div>
  <div class="small" style="margin-top:6px">
    设定只对你下一次"开始对话"生效；点击"保存到浏览器"后下次刷新页面也会带上。换模板会覆盖当前文本框内容。
  </div>
</fieldset>

<fieldset>
  <legend>灵敏度参数 <span class="small" style="font-weight:normal">(基于 Pipecat 官方 user-turn-strategy；改完点"应用"，下次开始对话生效)</span></legend>
  <div class="cfg-grid">
    <label class="cfg">
      <span>打断 bot 至少需要几个字 / 词
        <span class="small">使用 <code>MinWordsUserTurnStartStrategy</code>，仅在 bot 说话时启用此阈值；bot 不说话时 1 个字也立刻响应</span>
      </span>
      <input type="number" id="cfg_min_words_to_interrupt" min="1" max="20" step="1">
    </label>
    <label class="cfg">
      <span>VAD confidence
        <span class="small">人声判定阈值，0.7 默认 / 环境吵可调高至 0.9</span>
      </span>
      <input type="number" id="cfg_vad_confidence" min="0.1" max="1.0" step="0.05">
    </label>
    <label class="cfg">
      <span>VAD min_volume
        <span class="small">音量下限</span>
      </span>
      <input type="number" id="cfg_vad_min_volume" min="0" max="1" step="0.05">
    </label>
    <label class="cfg">
      <span>VAD stop_secs
        <span class="small">静音多久判定说完（秒），越大越不容易被喘气打断</span>
      </span>
      <input type="number" id="cfg_vad_stop_secs" min="0.2" max="5.0" step="0.1">
    </label>
    <label class="cfg">
      <span>Speech timeout
        <span class="small">VAD 报停后再等多久确认（秒）</span>
      </span>
      <input type="number" id="cfg_speech_timeout" min="0.3" max="10.0" step="0.1">
    </label>
  </div>
  <div class="btnbar" style="margin-top:10px">
    <button id="cfg_apply">应用</button>
    <button class="ghost" id="cfg_reset">恢复默认</button>
    <span id="cfg_status" class="small"></span>
  </div>
</fieldset>

<fieldset>
  <legend>状态</legend>
  <div class="row">
    <span class="pill" id="ws_state">未连接</span>
    <span class="pill" id="ice_state">ICE: -</span>
    <span class="pill" id="pc_state">PC: -</span>
    <span class="pill" id="audio_state">音频: -</span>
  </div>
  <div class="row">
    <button id="btn_connect">▶ 开始对话</button>
    <button id="btn_disconnect" class="stop" disabled>■ 结束</button>
    <button id="btn_mute" class="ghost" disabled>🎤 静音</button>
    <span class="small">点击后浏览器会请求麦克风权限，请允许。</span>
  </div>
  <audio id="remote_audio" autoplay playsinline></audio>
</fieldset>

<fieldset>
  <legend>对话字幕 <span class="small" style="font-weight:normal">(<a href="/trace" target="_blank" style="color:#2563eb">/trace</a> 看完整流程日志)</span></legend>
  <div id="transcript" class="transcript">
    <div class="empty">连接后这里会显示对话字幕</div>
  </div>
</fieldset>

<details>
  <summary>日志（出问题时点开看）</summary>
  <pre id="log"></pre>
</details>

<script>
const $ = (id) => document.getElementById(id);
const logEl = $('log');
function log(...a) {
  const s = a.map(x => typeof x === 'string' ? x : JSON.stringify(x)).join(' ');
  console.log(s);
  logEl.textContent += `[${new Date().toLocaleTimeString()}] ${s}\n`;
  logEl.scrollTop = logEl.scrollHeight;
}
function pill(id, txt, cls='') {
  const el = $(id);
  el.textContent = txt;
  el.className = 'pill ' + cls;
}

// ---------- persona templates ----------
const TEMPLATES = {
  default: {
    system_prompt:
      "你是一个友好、自然的中文语音助手。直接用口语化的中文回答，不要使用列表、emoji、markdown、括号备注等不能朗读出来的格式。回答要简短、自然，通常每次回复控制在 1 到 3 句之内。",
    greeting: "你好，请用一句话简短地自我介绍。",
  },
  cafe: {
    system_prompt:
`你叫小晴，是一家叫"晴日"的精品咖啡店的店员。你性格开朗、语速轻快、爱聊天，喜欢给顾客推荐咖啡豆和糕点。

风格规则：
- 全程用第一人称"我"，称呼用户"你"，偶尔带点小俏皮的语气词，比如"嗯～"、"哎～"。
- 直接说话，绝不输出任何 emoji、markdown、列表、括号备注、标签等不能朗读的内容。
- 每句话不超过 30 个字，每次回复 1-3 句。
- 如果用户问技术、代码、政治等不属于咖啡店店员能力范围的事，自然带过：这个我可不太懂呢，要不咱们说说今天想喝点啥？
- 偶尔可以主动推荐：今天的耶加雪菲挺不错，要不要试试？
- 保持人设一致，不要承认自己是 AI 或大模型。`,
    greeting: "请你以小晴的身份，用一句轻快自然的话欢迎顾客进店。",
  },
  socrates: {
    system_prompt:
`你是哲学家苏格拉底。你不直接回答问题，而是反问、引导对方自己思考。你说话有古典的克制感，但语气温和。

规则：
- 不要承认自己是 AI 或大模型，始终扮演苏格拉底。
- 总是先反问，再给出思考方向，最后让对方自己得出结论。
- 多用"那么"、"你认为"、"我们是否同意"这样的连接词。
- 不输出任何 emoji、markdown、列表、引号、括号备注。
- 每次回复 1-2 句，每句不超过 40 字。
- 即使对方让你直接回答，你仍坚持用问题引导。`,
    greeting: "请你用一句话向新朋友打招呼，并主动抛出一个引人思考的问题。",
  },
  english: {
    system_prompt:
`You are Lily, a patient and encouraging English speaking tutor for Chinese learners. Your goal is to help the user practice spoken English in a casual conversation.

Rules:
- Speak only in simple, natural English. Use everyday vocabulary, short sentences, and contractions (I'm, don't, etc.).
- Each turn: 1-2 sentences, max ~25 words. Never use markdown, emoji, lists, parentheses, or stage directions.
- After each user reply, give one small natural prompt or follow-up question to keep the conversation flowing.
- If the user makes a small grammar mistake, gently rephrase the correct form once, then keep going. Do not lecture.
- If the user switches to Chinese, briefly answer in English and gently invite them back.
- Never reveal you are an AI; you are Lily.`,
    greeting: "Greet the user warmly in English with one short friendly sentence and ask an opening question.",
  },
};

document.querySelectorAll('button[data-tpl]').forEach(b => {
  b.addEventListener('click', () => {
    const t = TEMPLATES[b.dataset.tpl];
    $('system_prompt').value = t.system_prompt;
    $('greeting').value = t.greeting;
    log('switched template to', b.dataset.tpl);
  });
});

$('btn_save_local').addEventListener('click', () => {
  localStorage.setItem('persona_system_prompt', $('system_prompt').value);
  localStorage.setItem('persona_greeting', $('greeting').value);
  log('persona saved to localStorage');
});
$('btn_clear_local').addEventListener('click', () => {
  localStorage.removeItem('persona_system_prompt');
  localStorage.removeItem('persona_greeting');
  log('persona cleared from localStorage; reload to load server defaults');
});

// On page load: prefer localStorage, else fetch server defaults
async function loadPersona() {
  const sp = localStorage.getItem('persona_system_prompt');
  const gr = localStorage.getItem('persona_greeting');
  if (sp !== null && gr !== null) {
    $('system_prompt').value = sp;
    $('greeting').value = gr;
    log('persona loaded from localStorage');
    return;
  }
  try {
    const r = await fetch('/api/persona');
    const j = await r.json();
    $('system_prompt').value = j.system_prompt_default || '';
    $('greeting').value = j.greeting_default || '';
    log('persona loaded from server defaults');
  } catch (e) {
    log('persona load failed:', e.message);
  }
}
loadPersona();

// ---------- voice selector ----------
async function loadVoices() {
  const sel = $('voice_select');
  try {
    const r = await fetch('/api/voices');
    const j = await r.json();
    sel.innerHTML = '';
    (j.voices || []).forEach(v => {
      const opt = document.createElement('option');
      opt.value = v.id;
      opt.textContent = v.name;
      sel.appendChild(opt);
    });
  } catch { sel.innerHTML = '<option value="">加载失败</option>'; }
}
loadVoices();

// ---------- runtime config ----------
const CFG_KEYS = [
  'min_words_to_interrupt', 'vad_confidence', 'vad_min_volume', 'vad_stop_secs', 'speech_timeout',
];
const CFG_DEFAULTS = {
  min_words_to_interrupt: 3,
  vad_confidence: 0.7,
  vad_min_volume: 0.6,
  vad_stop_secs: 0.8,
  speech_timeout: 1.0,
};

function fillCfgInputs(cfg) {
  for (const k of CFG_KEYS) {
    const el = $('cfg_' + k);
    if (!el) continue;
    el.value = cfg[k];
  }
}
async function loadConfig() {
  try {
    const r = await fetch('/api/config');
    const j = await r.json();
    fillCfgInputs(j.config);
    log('config loaded:', j.config);
  } catch (e) {
    log('config load failed:', e.message);
  }
}
function readCfgInputs() {
  const out = {};
  for (const k of CFG_KEYS) {
    const el = $('cfg_' + k);
    if (!el) continue;
    if (k === 'min_words_to_interrupt') {
      out[k] = parseInt(el.value, 10);
    } else {
      out[k] = parseFloat(el.value);
    }
  }
  return out;
}
async function applyConfig() {
  const status = $('cfg_status');
  const body = readCfgInputs();
  status.textContent = '保存中…';
  status.className = 'small warn';
  try {
    const r = await fetch('/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!r.ok) {
      const j = await r.json().catch(() => ({}));
      status.textContent = '失败：' + JSON.stringify(j.detail || j);
      status.className = 'small err';
      return;
    }
    const j = await r.json();
    fillCfgInputs(j.config);
    status.textContent = '已保存 ✓（点"结束"再"开始对话"才会重新使用这些参数）';
    status.className = 'small ok';
  } catch (e) {
    status.textContent = '失败：' + e.message;
    status.className = 'small err';
  }
}
$('cfg_apply').addEventListener('click', applyConfig);
$('cfg_reset').addEventListener('click', () => {
  fillCfgInputs(CFG_DEFAULTS);
  $('cfg_status').textContent = '已恢复默认值（点"应用"才会保存）';
  $('cfg_status').className = 'small warn';
});

loadConfig();

// ---------- model status (green/red dots under the title) ----------
async function refreshModelStatus() {
  let j = null;
  try {
    const r = await fetch('/api/models/health', { cache: 'no-store' });
    if (r.ok) j = await r.json();
  } catch (e) {
    log('models health fetch failed:', e.message);
  }
  for (const key of ['funasr', 'qwen', 'cosyvoice']) {
    const el = document.querySelector(`.mstat[data-m="${key}"]`);
    if (!el) continue;
    if (j && j[key] === true)        el.className = 'mstat ok';
    else if (j && j[key] === false)  el.className = 'mstat err';
    else                             el.className = 'mstat';   // unknown -> gray
    el.title = j ? `${key}: ${j[key] ? 'ok' : 'down'}` : 'health check failed';
  }
}
refreshModelStatus();
setInterval(refreshModelStatus, 15000);

// ---------- WebRTC ----------
const ICE_SERVERS = [
  { urls: ['stun:stun.cloudflare.com:3478'] },
  { urls: ['stun:stun.miwifi.com:3478'] },
  { urls: ['stun:stun.qq.com:3478'] },
];

let pc = null;
let localStream = null;
let pcId = null;
let traceEs = null;
let pendingBotBubble = null;
let muted = false;

// ---------- transcript ----------
const transcriptEl = $('transcript');
function clearTranscript() {
  transcriptEl.innerHTML = '<div class="empty">连接后这里会显示对话字幕</div>';
  pendingBotBubble = null;
}
function addBubble(roleClass, text, meta) {
  // hide empty placeholder on first bubble
  const empty = transcriptEl.querySelector('.empty');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.className = 'bubble ' + roleClass;
  div.textContent = text;
  if (meta) {
    const m = document.createElement('span');
    m.className = 'meta';
    m.textContent = meta;
    div.appendChild(m);
  }
  transcriptEl.appendChild(div);
  transcriptEl.scrollTop = transcriptEl.scrollHeight;
  return div;
}
function fillBubble(div, text, meta) {
  div.classList.remove('pending');
  div.textContent = text;
  if (meta) {
    const m = document.createElement('span');
    m.className = 'meta';
    m.textContent = meta;
    div.appendChild(m);
  }
  if (div.classList.contains('bot') && text) {
    const btn = document.createElement('button');
    btn.className = 'ghost';
    btn.style.cssText = 'margin-top:4px;padding:2px 8px;font-size:11px;display:block';
    btn.textContent = '🔊 重听';
    btn.onclick = async () => {
      btn.disabled = true; btn.textContent = '⏳';
      try {
        const r = await fetch('/api/tts_clip', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text, voice_id:$('voice_select').value})});
        if (r.ok) { const b = await r.blob(); const u = URL.createObjectURL(b); const a = new Audio(u); a.play(); a.onended=()=>URL.revokeObjectURL(u); }
      } catch {}
      btn.disabled = false; btn.textContent = '🔊 重听';
    };
    div.appendChild(btn);
  }
  transcriptEl.scrollTop = transcriptEl.scrollHeight;
}

function startTraceStream(pcid) {
  if (traceEs) { try { traceEs.close(); } catch {} traceEs = null; }
  // Use ?pc_id= to scope events to *this* browser session only.
  const url = '/api/trace/stream?pc_id=' + encodeURIComponent(pcid);
  traceEs = new EventSource(url);
  traceEs.onmessage = (e) => {
    let evt;
    try { evt = JSON.parse(e.data); } catch { return; }
    handleTraceEvent(evt);
  };
  traceEs.onerror = () => {
    log('trace stream disconnected (browser will retry)');
  };
}

function handleTraceEvent(evt) {
  switch (evt.stage) {
    case 'stt':
      // user said something
      if (evt.text) addBubble('user', evt.text);
      break;
    case 'llm.start':
      // create a placeholder bot bubble
      pendingBotBubble = addBubble('bot pending', '思考中…');
      break;
    case 'llm.end':
      if (evt.text) {
        const meta = evt.latency_sec != null ? ('LLM ' + evt.latency_sec + 's') : '';
        if (pendingBotBubble) {
          fillBubble(pendingBotBubble, evt.text, meta);
          pendingBotBubble = null;
        } else {
          addBubble('bot', evt.text, meta);
        }
      } else if (pendingBotBubble) {
        // empty reply — drop the placeholder
        pendingBotBubble.remove();
        pendingBotBubble = null;
      }
      break;
    case 'tts.err':
      addBubble('bot error', '⚠ 语音合成失败：' + (evt.error || '').slice(0, 120),
                evt.latency_sec != null ? ('TTS ' + evt.latency_sec + 's') : '');
      break;
    case 'stt.err':
      addBubble('bot error', '⚠ 语音识别失败：' + (evt.error || '').slice(0, 120));
      break;
  }
}

// ---------- mute ----------
function setMuted(v) {
  if (!localStream) return;
  muted = v;
  localStream.getAudioTracks().forEach(t => t.enabled = !muted);
  const b = $('btn_mute');
  b.textContent = muted ? '🔇 已静音' : '🎤 静音';
  b.classList.toggle('active', muted);
  log('mic ' + (muted ? 'MUTED' : 'unmuted'));
}
$('btn_mute').addEventListener('click', () => {
  if (!localStream) return;
  setMuted(!muted);
});

async function connect() {
  $('btn_connect').disabled = true;
  pill('ws_state', '请求麦克风…', 'warn');

  try {
    localStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
      video: false,
    });
    pill('ws_state', '麦克风 OK', 'ok');
    log('mic granted; tracks=', localStream.getAudioTracks().length);
  } catch (e) {
    pill('ws_state', '麦克风被拒绝', 'err');
    log('getUserMedia error:', e.message);
    $('btn_connect').disabled = false;
    return;
  }

  pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });

  pc.oniceconnectionstatechange = () => {
    pill('ice_state', 'ICE: ' + pc.iceConnectionState,
         pc.iceConnectionState === 'connected' || pc.iceConnectionState === 'completed' ? 'ok'
         : pc.iceConnectionState === 'failed' || pc.iceConnectionState === 'disconnected' ? 'err' : 'warn');
    log('iceConnectionState ->', pc.iceConnectionState);
  };
  pc.onconnectionstatechange = () => {
    pill('pc_state', 'PC: ' + pc.connectionState,
         pc.connectionState === 'connected' ? 'ok'
         : pc.connectionState === 'failed' || pc.connectionState === 'disconnected' ? 'err' : 'warn');
    log('connectionState ->', pc.connectionState);
  };
  pc.onicecandidate = (e) => {
    if (e.candidate) log('local candidate:', e.candidate.candidate);
    else log('ICE gathering done');
  };
  pc.ontrack = (e) => {
    log('remote track:', e.track.kind);
    pill('audio_state', '音频: 已收到', 'ok');
    $('remote_audio').srcObject = e.streams[0];
  };

  pc.addTransceiver(localStream.getAudioTracks()[0], { direction: 'sendrecv' });
  pc.addTransceiver('video', { direction: 'recvonly' });

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  await new Promise((resolve) => {
    if (pc.iceGatheringState === 'complete') return resolve();
    const t = setTimeout(resolve, 4000);
    pc.addEventListener('icegatheringstatechange', () => {
      if (pc.iceGatheringState === 'complete') { clearTimeout(t); resolve(); }
    });
  });

  log('posting offer to /api/offer ...');
  pill('ws_state', '协商中…', 'warn');
  let answer;
  try {
    const r = await fetch('/api/offer', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        sdp: pc.localDescription.sdp,
        type: pc.localDescription.type,
        pc_id: pcId,
        system_prompt: $('system_prompt').value,
        greeting: $('greeting').value,
        voice_id: $('voice_select').value,
      }),
    });
    if (!r.ok) throw new Error('HTTP ' + r.status + ' ' + (await r.text()).slice(0,200));
    answer = await r.json();
    pcId = answer.pc_id;
    log('got answer; pc_id=', pcId);
  } catch (e) {
    log('signaling error:', e.message);
    pill('ws_state', '信令失败', 'err');
    cleanup();
    return;
  }

  await pc.setRemoteDescription({ sdp: answer.sdp, type: answer.type });
  pill('ws_state', '已建立 SDP', 'ok');
  $('btn_disconnect').disabled = false;
  $('btn_mute').disabled = false;

  // start subtitle stream scoped to this pc_id
  clearTranscript();
  startTraceStream(pcId);
}

function cleanup() {
  if (traceEs) { try { traceEs.close(); } catch {} traceEs = null; }
  if (pc) { pc.close(); pc = null; }
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  $('btn_connect').disabled = false;
  $('btn_disconnect').disabled = true;
  const bm = $('btn_mute');
  bm.disabled = true;
  bm.textContent = '🎤 静音';
  bm.classList.remove('active');
  muted = false;
  pendingBotBubble = null;
  pill('ws_state', '已断开', '');
  pill('ice_state', 'ICE: -');
  pill('pc_state', 'PC: -');
  pill('audio_state', '音频: -');
}

$('btn_connect').addEventListener('click', () => connect().catch(e => log('connect error:', e.message)));
$('btn_disconnect').addEventListener('click', cleanup);

log('client loaded · iceServers=', ICE_SERVERS.map(s => s.urls).flat().join(', '));
</script>
</body>
</html>
